name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Install Tesseract OCR (Windows)
        run: |
          choco install tesseract --no-progress
          if (!(Test-Path -Path "bin/tesseract")) {
            New-Item -ItemType Directory -Path "bin/tesseract" -Force | Out-Null
          }
          # Copy Tesseract files from default install path
          Copy-Item "C:\Program Files\Tesseract-OCR\*" "bin/tesseract" -Recurse -Force

      - name: Build backend exe
        run: |
          pyinstaller --noconfirm --onefile --clean --name rain-api --add-data "data;data" --add-data "bin/tesseract;bin/tesseract" rain_api_entry.py

      - name: Diagnostics - List dist directory
        run: |
          Get-ChildItem -Path dist -Recurse

      - name: Smoke test backend exe
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path "dist" -Filter "rain-api.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (!$exePath) {
            Write-Error "rain-api.exe not found after build"
            exit 1
          }
          $env:TEACHER_COPILOT_HOST = "127.0.0.1"
          $env:TEACHER_COPILOT_PORT = "18010"
          $env:TEACHER_COPILOT_RELOAD = "0"
          $stdout = Join-Path $env:RUNNER_TEMP "rain-api-smoke-stdout.log"
          $stderr = Join-Path $env:RUNNER_TEMP "rain-api-smoke-stderr.log"
          $p = Start-Process -FilePath $exePath -PassThru -WindowStyle Hidden -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          try {
            $ok = $false
            for ($i = 0; $i -lt 80; $i++) {
              try {
                $resp = Invoke-RestMethod -Uri "http://127.0.0.1:18010/health" -TimeoutSec 2
                if ($resp.status -eq "ok") {
                  $ok = $true
                  break
                }
              } catch {}
              if ($p.HasExited) {
                break
              }
              Start-Sleep -Milliseconds 500
            }
            if (-not $ok) {
              Write-Host "---- rain-api stdout ----"
              if (Test-Path $stdout) { Get-Content $stdout -ErrorAction SilentlyContinue }
              Write-Host "---- rain-api stderr ----"
              if (Test-Path $stderr) { Get-Content $stderr -ErrorAction SilentlyContinue }
              if ($p.HasExited) {
                Write-Host "rain-api exited with code: $($p.ExitCode)"
              } else {
                Write-Host "rain-api process did not become healthy in time"
              }
              Write-Error "Backend smoke test failed: /health did not return status=ok"
              exit 1
            }
          } finally {
            if (!$p.HasExited) {
              Stop-Process -Id $p.Id -Force
            }
          }

      - name: Copy backend into Tauri bundle
        run: |
          if (!(Test-Path -Path "frontend/src-tauri/bin")) {
            New-Item -ItemType Directory -Path "frontend/src-tauri/bin" -Force | Out-Null
          }
          $exePath = Get-ChildItem -Path "dist" -Filter "rain-api.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if ($exePath) {
            Write-Host "Found executable at: $exePath"
            Copy-Item $exePath "frontend/src-tauri/bin/rain-api-x86_64-pc-windows-msvc.exe" -Force
          } else {
            Write-Error "Could not find rain-api.exe in dist directory"
            exit 1
          }

      - name: Verify sidecar file
        shell: pwsh
        run: |
          $sidecar = "frontend/src-tauri/bin/rain-api-x86_64-pc-windows-msvc.exe"
          if (!(Test-Path -Path $sidecar)) {
            Write-Error "Sidecar not found: $sidecar"
            exit 1
          }
          $size = (Get-Item $sidecar).Length
          Write-Host "Sidecar size: $size bytes"
          if ($size -lt 1000000) {
            Write-Error "Sidecar looks too small; likely invalid placeholder/bad build"
            exit 1
          }

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Tauri app
        working-directory: frontend
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rain-windows-bundle
          path: frontend/src-tauri/target/release/bundle/**
