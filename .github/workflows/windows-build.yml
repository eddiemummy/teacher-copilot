name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build backend exe
        run: |
          pyinstaller --noconfirm --onefile --name teacher-copilot-api --add-data "data;data" app.py

      - name: Copy backend into Tauri bundle
        run: |
          if (!(Test-Path -Path "frontend/src-tauri/bin")) { New-Item -ItemType Directory -Path "frontend/src-tauri/bin" | Out-Null }
          Copy-Item "dist/teacher-copilot-api.exe" "frontend/src-tauri/bin/teacher-copilot-api.exe" -Force

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Tauri app
        working-directory: frontend
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teacher-copilot-windows-bundle
          path: frontend/src-tauri/target/release/bundle/**
